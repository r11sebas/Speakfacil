<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeakFácil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f7; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #4F46E5; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(79,70,229,0.3); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .header-info p { font-weight: 600; font-size: 16px; }
    .header-info span { font-size: 12px; opacity: 0.75; }
    .chat { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }
    .bubble { max-width: 78%; padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.6; word-break: break-word; }
    .bubble.bot { background: white; border: 1px solid #e5e7eb; align-self: flex-start; border-bottom-left-radius: 4px; color: #1f2937; }
    .bubble.user { background: #4F46E5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .bubble.typing { background: white; border: 1px solid #e5e7eb; align-self: flex-start; color: #9ca3af; font-style: italic; border-bottom-left-radius: 4px; }
    .input-area { padding: 12px 16px; background: white; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; align-items: center; }
    input { flex: 1; border: 1.5px solid #e5e7eb; border-radius: 24px; padding: 11px 18px; font-size: 14px; outline: none; transition: border 0.2s; background: #fafafa; }
    input:focus { border-color: #4F46E5; background: white; }
    .send-btn { background: #4F46E5; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    .send-btn:hover { background: #4338ca; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="header">
  <div class="avatar">SF</div>
  <div class="header-info">
    <p>SpeakFácil</p>
    <span>Tu compañero de inglés</span>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="input" placeholder="Escribe tu mensaje..." autocomplete="off" />
  <button class="send-btn" id="btn" onclick="sendMessage()">➤</button>
</div>

<script>
  var BACKEND_URL = 'https://script.google.com/macros/s/AKfycbw1W4WGZgycKAukKjpITgNojWrZ1F0syB5mA2jzsWsI6vqi0hVA-2ETbc6qt3KdMwDL/exec';
  var historial = [];
  var isTyping = false;

  window.onload = function() {
    var mensajeInicial = '¡Hola! Soy SpeakFácil, tu compañero de inglés. No soy un profesor — soy más como un amigo con quien practicar sin presión. 😊\n\nCuéntame: ¿por qué quieres aprender inglés? No hay respuesta correcta.';
    addMessage('bot', mensajeInicial);
    historial.push({ role: 'assistant', content: mensajeInicial });
    document.getElementById('input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  };

  function addMessage(type, text) {
    var chat = document.getElementById('chat');
    var div = document.createElement('div');
    div.className = 'bubble ' + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function sendMessage() {
    if (isTyping) return;
    var input = document.getElementById('input');
    var text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    historial.push({ role: 'user', content: text });
    input.value = '';
    isTyping = true;
    document.getElementById('btn').disabled = true;

    var typingDiv = addMessage('typing', 'SpeakFácil está escribiendo...');

    fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ historial: historial })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      typingDiv.remove();
      var respuesta = data.response;
      addMessage('bot', respuesta);
      historial.push({ role: 'assistant', content: respuesta });
      isTyping = false;
      document.getElementById('btn').disabled = false;
    })
    .catch(function() {
      typingDiv.remove();
      addMessage('bot', 'Ups, algo falló. Intenta de nuevo.');
      isTyping = false;
      document.getElementById('btn').disabled = false;
    });
  }
</script>

</body>
</html>
